name: vereinsheim

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      RINGWERK_HOST: ${RINGWERK_HOST}
      TREFFSICHER_HOST: ${TREFFSICHER_HOST}
      ACME_EMAIL: ${ACME_EMAIL}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - web

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      RINGWERK_DB_PASSWORD: ${RINGWERK_DB_PASSWORD}
      TREFFSICHER_DB_PASSWORD: ${TREFFSICHER_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - data

  migrate-ringwerk:
    image: ${DOCKER_USER}/ringwerk:${RINGWERK_MIGRATOR_TAG:-latest-migrator}
    restart: "no"
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://ringwerk:${RINGWERK_DB_PASSWORD}@db:5432/ringwerk
      PRISMA_AUTO_RESOLVE_FAILED_MIGRATIONS: "true"
      PRISMA_AUTO_RESOLVE_UNKNOWN_FAILED_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - data

  migrate-treffsicher:
    image: ${DOCKER_USER}/treffsicher:${TREFFSICHER_MIGRATOR_TAG:-latest-migrator}
    restart: "no"
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://treffsicher:${TREFFSICHER_DB_PASSWORD}@db:5432/treffsicher
      PRISMA_AUTO_RESOLVE_FAILED_MIGRATIONS: "true"
      PRISMA_AUTO_RESOLVE_UNKNOWN_FAILED_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - data

  app-ringwerk:
    image: ${DOCKER_USER}/ringwerk:${RINGWERK_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://ringwerk:${RINGWERK_DB_PASSWORD}@db:5432/ringwerk
      NEXTAUTH_SECRET: ${RINGWERK_NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://${RINGWERK_HOST}
      SEED_ADMIN_EMAIL: ${RINGWERK_SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${RINGWERK_SEED_ADMIN_PASSWORD}
      DISPLAY_TIME_ZONE: ${DISPLAY_TIME_ZONE:-Europe/Berlin}
      AUTH_TRUST_PROXY_HEADERS: "true"
    depends_on:
      db:
        condition: service_healthy
      migrate-ringwerk:
        condition: service_completed_successfully
    networks:
      - web
      - data

  app-treffsicher:
    image: ${DOCKER_USER}/treffsicher:${TREFFSICHER_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://treffsicher:${TREFFSICHER_DB_PASSWORD}@db:5432/treffsicher
      NEXTAUTH_SECRET: ${TREFFSICHER_NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://${TREFFSICHER_HOST}
      ADMIN_EMAIL: ${TREFFSICHER_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${TREFFSICHER_ADMIN_PASSWORD}
      UPLOAD_DIR: /app/uploads
      DISPLAY_TIME_ZONE: ${DISPLAY_TIME_ZONE:-Europe/Berlin}
      AUTH_TRUST_PROXY_HEADERS: "true"
    volumes:
      - uploads_treffsicher:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate-treffsicher:
        condition: service_completed_successfully
    networks:
      - web
      - data

networks:
  web:
  data:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  uploads_treffsicher:
