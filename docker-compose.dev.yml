# Lokale Entwicklung im Monorepo: EIN geteilter Postgres mit zwei Dev-DBs
# (ringwerk + treffsicher, gleiche Namen wie Prod), isoliert via db-init
# (ADR-002-Muster). Die Apps selbst
# laufen auf dem HOST via `pnpm dev` (nicht in Docker) — Hot-Reload + ein
# Befehlssatz von der Wurzel.
#
#   docker compose -f docker-compose.dev.yml up -d   # Postgres starten
#   pnpm dev                                          # beide Apps (Host)
#
# Bewusst getrennt vom Prod-Stack (compose.yml): eigener project-name und
# eigene Volumes → kein Eingriff in den Deploy-Vertrag.
name: vereinsheim-dev

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      # Host-Apps verbinden sich via localhost:5432 (zwei DBs, ein Container).
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./dev/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
