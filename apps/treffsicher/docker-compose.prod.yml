services:
  migrate:
    image: treffsicher-migrator:latest
    build:
      context: .
      target: migrator
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PRISMA_AUTO_RESOLVE_FAILED_MIGRATIONS=${PRISMA_AUTO_RESOLVE_FAILED_MIGRATIONS:-true}
      - PRISMA_AUTO_RESOLVE_UNKNOWN_FAILED_MIGRATIONS=${PRISMA_AUTO_RESOLVE_UNKNOWN_FAILED_MIGRATIONS:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    image: treffsicher:latest
    build:
      context: .
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - UPLOAD_DIR=/app/uploads
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AUTH_TRUST_PROXY_HEADERS=${AUTH_TRUST_PROXY_HEADERS:-false}
      - AUTH_RATE_LIMIT_MAX_BUCKETS=${AUTH_RATE_LIMIT_MAX_BUCKETS:-10000}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port nicht nach aussen freigeben — DB nur intern erreichbar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
