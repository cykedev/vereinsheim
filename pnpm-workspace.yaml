packages:
  - "apps/*"
  - "packages/*"

# Catalog = zentrale Versionsquelle für geteilte Dependencies (ADR-015: Drift
# strukturell lösen). Jede App referenziert "catalog:" statt einer literalen
# Version → eine Version, kein Drift, pnpm-strict (keine Phantom-Deps).
# App-spezifische Deps bleiben als literale Version in apps/*/package.json.
#
# Versionen sind EXAKT gepinnt (kein "^"): der Catalog dokumentiert die real
# verwendete Version, und ein `pnpm update` kann nicht mehr still innerhalb
# einer Caret-Range bumpen, ohne dass der Pin sichtbar im Diff steht. Die
# Reproduzierbarkeit selbst garantiert weiterhin pnpm-lock.yaml (Build via
# `pnpm install --frozen-lockfile`). Beim bewussten Anheben: Version hier
# setzen + `pnpm install` (Lockfile-Sync) committen.
catalog:
  # --- runtime (in beiden Apps, identische Version) ---
  "@prisma/adapter-pg": "7.8.0"
  "@prisma/client": "7.8.0"
  bcryptjs: "3.0.3"
  class-variance-authority: "0.7.1"
  clsx: "2.1.1"
  lucide-react: "1.21.0"
  next: "16.2.9"
  next-auth: "4.24.14"
  next-themes: "0.4.6"
  pg: "8.22.0"
  prisma: "7.8.0"
  # slider.tsx importiert dieses Subpaket direkt (sonst nur transitiv über das
  # radix-ui-Umbrella) → unter pnpm-Strenge explizit als geteilte Dep nötig.
  "@radix-ui/react-slider": "1.4.1"
  radix-ui: "1.6.0"
  react: "19.2.7"
  react-dom: "19.2.7"
  sonner: "2.0.7"
  tailwind-merge: "3.6.0"
  zod: "4.4.3"
  # --- dev (in beiden Apps, identische Version) ---
  "@tailwindcss/postcss": "4.3.1"
  "@types/bcryptjs": "2.4.6"
  "@types/node": "24.13.2"
  "@types/pg": "8.20.0"
  "@types/react": "19.2.17"
  "@types/react-dom": "19.2.3"
  "@vitejs/plugin-react": "6.0.2"
  dotenv: "17.4.2"
  eslint: "9.39.4"
  eslint-config-next: "16.2.9"
  prettier: "3.8.4"
  shadcn: "4.11.0"
  tailwindcss: "4.3.1"
  tsx: "4.22.4"
  tw-animate-css: "1.4.0"
  typescript: "6.0.3"
  vitest: "4.1.9"
